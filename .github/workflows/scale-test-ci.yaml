name: Scale Test CI

on:
  workflow_dispatch:
  schedule:
    # Sunday 04:00 UTC.
    - cron: "0 4 * * 0"

permissions:
  contents: write

env:
  HISTORY_BRANCH: scale-test-history

jobs:
  run-scale-test:
    # Run the weekly schedule only in the main repo, while keeping manual runs available in forks.
    if: github.event_name != 'schedule' || github.repository == 'ai-dynamo/grove'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GROVE_E2E_PYROSCOPE_DISABLED: "true"
    steps:
      - name: Print runner specs
        run: |
          echo "CPUs: $(nproc)"
          echo "RAM: $(free -h | awk '/^Mem:/ {print $2}')"

      - name: Checkout
        uses: actions/checkout@v4

      - name: E2E setup
        uses: ./.github/actions/e2e-setup
        with:
          go-version: "1.26.3"

      # Compile before cluster setup so KWOK nodes are fresh when the test starts.
      # KWOK nodes can become NotReady if the Go build runs after creation.
      - name: Compile scale test
        working-directory: operator
        run: |
          go test -c -tags='e2e soak' ./e2e/tests/scale -o "${RUNNER_TEMP}/scale.test"

      - name: Create scale cluster
        working-directory: operator
        run: |
          make scale-cluster-up E2E_CREATE_FLAGS='--dind-memory-mode --set pyroscope.enabled=false --set grove.profiling=false'

      - name: Run scale test
        working-directory: operator/e2e/tests/scale
        env:
          GROVE_E2E_DIAG_DIR: ${{ runner.temp }}/grove-scale
          GROVE_E2E_DIAG_MODE: file
        run: |
          "${RUNNER_TEMP}/scale.test" -test.v -test.timeout=90m

      - name: Print scale cluster diagnostics
        if: failure()
        run: |
          echo "## docker ps"
          docker ps -a || true
          echo
          echo "## k3d clusters"
          k3d cluster list || true
          echo
          echo "## helm releases"
          helm list -A || true
          echo
          echo "## nodes"
          kubectl get nodes -o wide || true
          echo
          echo "## pods"
          kubectl get pods -A -o wide || true
          echo
          echo "## events"
          kubectl get events -A --sort-by=.lastTimestamp || true
          echo
          echo "## grove operator logs"
          kubectl logs -n grove-system -l app.kubernetes.io/name=grove-operator --all-containers=true --tail=-1 || true

      - name: Store scale result
        if: success()
        env:
          HISTORY_REPO: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
        run: |
          ./operator/hack/scale-history.py branch \
            --input "${RUNNER_TEMP}/grove-scale" \
            --repo "${HISTORY_REPO}" \
            --workdir "${RUNNER_TEMP}/grove-scale-history" \
            --branch "${HISTORY_BRANCH}" \
            --commit "${GITHUB_SHA}" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Cleanup scale cluster
        if: always()
        working-directory: operator
        run: |
          make scale-cluster-down || true
